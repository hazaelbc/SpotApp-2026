name: Install Skills

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  install-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run skills installer
        run: node scripts/install-skills.js
